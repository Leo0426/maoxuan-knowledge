services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: maoxuan-knowledge-backend:latest
    restart: unless-stopped
    volumes:
      - backend_data:/app/backend/data
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: maoxuan-knowledge-frontend:latest
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_data:
